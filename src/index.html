<!doctype html>

		<meta charset="utf-8" />
		<title>Old Street</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const storedMode = localStorage.getItem('app-mode');
				const preferredMode =
					storedMode === 'dark' || storedMode === 'light'
						? storedMode
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-mode', preferredMode);
			} catch {}
		</script>

		<meta
			name="description"
			content="Old Street — ваш улюблений заклад для ідеального ранку та затишного вечора. Сніданки, вишукані страви, авторські коктейлі та неповторна атмосфера."
		/>
