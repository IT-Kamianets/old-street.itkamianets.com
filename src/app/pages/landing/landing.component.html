<section class="min-h-screen bg-[var(--c-bg-primary)] py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    
    <header class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-bold text-[var(--c-text-primary)] mb-4">Меню Old Street</h1>
      <p class="text-lg text-[var(--c-text-secondary)]">Оберіть свої улюблені страви та напої</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      
      @for (item of menuItems(); track item.name) {
        <article class="flex flex-col bg-[var(--c-bg-secondary)] rounded-2xl border border-[var(--c-border)] overflow-hidden transition-transform hover:-translate-y-1 hover:shadow-lg">
          
          <div class="relative h-56 w-full overflow-hidden bg-[var(--c-border)] flex items-center justify-center">
            @if (item.imageUrl) {
              <img 
                [src]="item.imageUrl" 
                [alt]="item.name" 
                class="object-cover w-full h-full transition-transform duration-500 hover:scale-105"
                loading="lazy"
              >
            } @else {
              <span class="material-symbols-outlined text-5xl text-[var(--c-text-secondary)]" aria-hidden="true">
                local_cafe
              </span>
            }
          </div>

          <div class="p-5 flex flex-col flex-grow">
            
            <div class="flex justify-between items-start mb-3 gap-3">
              <h2 class="text-xl font-bold text-[var(--c-text-primary)] leading-tight">
                {{ item.name }}
              </h2>
              <span class="text-lg font-bold whitespace-nowrap text-[var(--c-text-primary)] bg-[var(--c-border)] px-2 py-1 rounded-lg">
                {{ item.price }} ₴
              </span>
            </div>
            
            <p class="text-sm text-[var(--c-text-secondary)] flex-grow mb-4 leading-relaxed">
              {{ item.description }}
            </p>
            
            <div class="mt-auto border-t border-[var(--c-border)] pt-3 flex items-center justify-between text-sm text-[var(--c-text-secondary)]">
              @if (item.weight) {
                <span class="flex items-center gap-1 font-medium">
                  <span class="material-symbols-outlined text-[18px]">scale</span>
                  {{ item.weight }}
                </span>
              } @else {
                <span></span>
              }
            </div>
            
          </div>
        </article>
      }
      
    </div>
  </div>
</section>
